<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Application received — Operator pilot | Hermosskills</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0f766e" />
  <style>
    :root {
      --ink: #0f1f1c; --muted: #5a6b66; --teal: #0f766e; --line: #d5e3df;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    body {
      margin: 0; color: var(--ink); min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(circle at 20% 0%, rgba(15,118,110,.14), transparent 28rem), #f7fbfa;
      padding: 2rem;
    }
    .card {
      max-width: 32rem; background: #fff; border: 1px solid var(--line); border-radius: 20px;
      padding: 2rem; box-shadow: 0 20px 50px rgba(15,31,28,.1);
    }
    h1 { margin: 0 0 .75rem; letter-spacing: -.04em; font-size: 1.85rem; }
    p { color: var(--muted); line-height: 1.55; }
    a {
      display: inline-flex; margin-top: 1rem; padding: .85rem 1.1rem; border-radius: 999px;
      background: var(--teal); color: #fff; text-decoration: none; font-weight: 750;
    }
    .score { font-weight: 800; color: var(--teal); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Application received.</h1>
    <p>
      Thanks — we’ll review fit (including your score
      <span class="score" id="score"></span>)
      and only reach out if a pilot makes sense for both sides.
    </p>
    <p>No spam list. No auto-sequence. Human review.</p>
    <a href="https://hermosskills.com/">Back to Hermosskills</a>
  </div>
  <script>
    const s = new URLSearchParams(location.search).get('score');
    document.getElementById('score').textContent = s ? '(' + s + '/100)' : '';
  </script>
</body>
</html>

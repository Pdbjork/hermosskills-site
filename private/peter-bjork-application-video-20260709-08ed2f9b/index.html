<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Peter Bjork — Supplemental Application Video</title>
  <style>
    :root { color-scheme: light dark; --bg: #f8fafc; --fg: #172033; --muted: #64748b; --card: #ffffff; --line: #dbe3ef; --accent: #0f766e; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --fg: #e5eefb; --muted: #9aa8bc; --card: #111c31; --line: #26364f; --accent: #5eead4; } }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.55; }
    main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: clamp(32px, 7vw, 72px) 0; }
    .card { border: 1px solid var(--line); border-radius: 22px; background: var(--card); padding: clamp(18px, 4vw, 32px); box-shadow: 0 18px 60px rgba(15, 23, 42, .08); }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 44px); letter-spacing: -.04em; line-height: 1.05; }
    p { color: var(--muted); margin: 0 0 20px; }
    video { width: 100%; border-radius: 16px; background: #000; display: block; }
    a { color: var(--accent); font-weight: 700; }
    .note { margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Supplemental Application Video</h1>
      <p>Peter Bjork · supplemental video material for application review.</p>
      <video controls preload="metadata" playsinline>
        <source src="./peter-bjork-application-video.mp4" type="video/mp4" />
        Your browser does not support embedded video. <a href="./peter-bjork-application-video.mp4">Download the video</a>.
      </video>
      <p class="note"><a href="./peter-bjork-application-video.mp4">Direct video link</a></p>
    </section>
  </main>
</body>
</html>
